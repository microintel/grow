<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redundant - Academic Management System</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- Auth Screen -->
    <div id="auth-screen" class="auth-container">
        <div class="auth-card">
            <h1>Redundant</h1>
            <p>Student Academic Management System</p>
            <button id="btn-login" class="btn btn-primary">Sign in with Google</button>
        </div>
    </div>

    <!-- Main App Layout (Hidden by default) -->
    <div id="app-screen" class="app-container hidden">
        
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">Redundant</div>
            <nav class="sidebar-nav">
                <button class="nav-link active" data-target="sec-dashboard">Dashboard</button>
                <button class="nav-link" data-target="sec-profile">Profile</button>
                <button class="nav-link" data-target="sec-academics">Academics</button>
            </nav>
            <div class="sidebar-footer">
                <button id="btn-theme-toggle" class="btn btn-secondary">Toggle Theme</button>
                <button id="btn-logout" class="btn btn-danger">Log Out</button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="top-navbar">
                <button id="btn-menu-toggle" class="mobile-menu-btn">Menu</button>
                <div class="user-badge">
                    <span id="nav-user-name">Loading...</span>
                </div>
            </header>

            <div class="content-body">
                <!-- Toast Notifications Container -->
                <div id="toast-container" class="toast-container"></div>

                <!-- SECTION: DASHBOARD -->
                <section id="sec-dashboard" class="app-section">
                    <h2>Dashboard</h2>
                    <div class="metrics-grid">
                        <div class="card metric-card"><h3>Attendance</h3><p id="dash-attendance">0%</p></div>
                        <div class="card metric-card"><h3>CGPA</h3><p id="dash-cgpa">0.00</p></div>
                        <div class="card metric-card"><h3>Total Semesters</h3><p id="dash-sems">0</p></div>
                        <div class="card metric-card"><h3>Total Subjects</h3><p id="dash-subjects">0</p></div>
                        <div class="card metric-card"><h3>Highest Marks</h3><p id="dash-high">N/A</p></div>
                        <div class="card metric-card"><h3>Lowest Marks</h3><p id="dash-low">N/A</p></div>
                    </div>
                    <div class="charts-grid">
                        <div class="card chart-card"><canvas id="chart-performance"></canvas></div>
                        <div class="card chart-card"><canvas id="chart-attendance"></canvas></div>
                    </div>
                </section>

                <!-- SECTION: PROFILE -->
                <section id="sec-profile" class="app-section hidden">
                    <h2>Student Profile</h2>
                    <div class="card">
                        <form id="form-profile" class="form-grid">
                            <div class="form-group span-2">
                                <label>Profile Image URL</label>
                                <input type="text" id="prof-img" placeholder="https://example.com/photo.jpg">
                            </div>
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="prof-name" required>
                            </div>
                            <div class="form-group">
                                <label>USN / Roll Number</label>
                                <input type="text" id="prof-usn" required>
                            </div>
                            <div class="form-group">
                                <label>College Name</label>
                                <input type="text" id="prof-college">
                            </div>
                            <div class="form-group">
                                <label>Department</label>
                                <input type="text" id="prof-dept">
                            </div>
                            <div class="form-group">
                                <label>Course & Branch</label>
                                <input type="text" id="prof-course">
                            </div>
                            <div class="form-group">
                                <label>Current Semester</label>
                                <input type="number" id="prof-sem" min="1" max="10">
                            </div>
                            <div class="form-group">
                                <label>Academic Year</label>
                                <input type="text" id="prof-year" placeholder="2025-2026">
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="prof-email" readonly>
                            </div>
                            <div class="form-group">
                                <label>Phone Number</label>
                                <input type="tel" id="prof-phone">
                            </div>
                            <div class="form-group span-2">
                                <label>Skills (Comma separated)</label>
                                <input type="text" id="prof-skills">
                            </div>
                            <button type="submit" class="btn btn-primary">Save Profile</button>
                        </form>
                    </div>
                </section>

                <!-- SECTION: ACADEMICS (Sems, Subjects, Assessments) -->
                <section id="sec-academics" class="app-section hidden">
                    <div class="section-header-actions">
                        <h2>Academic Records</h2>
                        <div class="action-buttons">
                            <button id="btn-add-sem" class="btn btn-primary">Add Semester</button>
                            <button id="btn-export-json" class="btn btn-secondary">Export Data (JSON)</button>
                        </div>
                    </div>

                    <!-- Filter Toolbar -->
                    <div class="toolbar card">
                        <input type="text" id="search-subject" placeholder="Search subjects by name or code...">
                        <select id="filter-sem">
                            <option value="all">All Semesters</option>
                        </select>
                    </div>

                    <div id="semesters-container" class="semesters-stack">
                        <!-- Dynamic Tree injection -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <!-- MODAL: Semester / Subject / Assessment Dynamic Modals -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 id="modal-title">Manage Entry</h3>
            <form id="modal-form">
                <div id="modal-form-fields"></div>
                <div class="modal-actions">
                    <button type="button" id="btn-modal-cancel" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
