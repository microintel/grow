let container=document.getElementById("container");

function render(list){

container.innerHTML="";

list.forEach(q=>{

let card=document.createElement("div");
card.className="card";

let html=`<div class="q">${q.question_number} : ${q.question}</div>`;

html+=`<div class="options">`;

q.options.forEach(o=>{
html+=`<div>• ${o}</div>`;
});

html+=`</div>`;

html+=`<div class="answer">Answer : ${q.answer}</div>`;

card.innerHTML=html;

card.onclick=()=>{
let ans=card.querySelector(".answer");
ans.style.display=ans.style.display==="block"?"none":"block";
};

container.appendChild(card);

});

}

render(questions);

document.getElementById("search").addEventListener("input",function(){

let value=this.value.toLowerCase();

let filtered=questions.filter(q=>

q.question.toLowerCase().includes(value) ||
q.question_number.toLowerCase().includes(value)

);

render(filtered);

});
