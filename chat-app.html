<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ember — Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #161619;
    --surface2: #1e1e23;
    --border: rgba(255,255,255,0.07);
    --accent: #ff5e3a;
    --accent2: #ff9a5c;
    --text: #f0eee8;
    --muted: #6b6a72;
    --bubble-me: #ff5e3a;
    --bubble-them: #1e1e23;
    --sidebar-w: 300px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Times New Roman', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── Login Screen ── */
  #login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
    gap: 0;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  #login-screen::before {
    content: '';
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,94,58,0.18) 0%, transparent 70%);
    top: -150px; left: 50%; transform: translateX(-50%);
    pointer-events: none;
  }
  .login-card {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 56px 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    width: min(420px, 92vw);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }
  .logo-mark {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .login-card h1 {
    font-family: 'Times New Roman', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    text-align: center;
    line-height: 1.1;
  }
  .login-card h1 span { color: var(--accent); }
  .login-card p {
    color: var(--muted);
    font-size: 0.95rem;
    text-align: center;
    line-height: 1.6;
    margin-top: -16px;
  }
  #google-login-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--text);
    color: #111;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    width: 100%;
    justify-content: center;
    transition: all 0.2s ease;
  }
  #google-login-btn:hover {
    background: #e8e6e0;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(255,94,58,0.25);
  }
  #google-login-btn svg { flex-shrink: 0; }

  /* ── App Shell ── */
  #app {
    display: none;
    flex-direction: row;
    height: 100dvh;
    overflow: hidden;
  }
  #app.visible { display: flex; }

  /* ── Sidebar ── */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform 0.3s ease;
  }
  .sidebar-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .sidebar-logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .sidebar-logo span { color: var(--accent); }
  .sidebar-header-actions { margin-left: auto; display: flex; gap: 8px; }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-size: 16px;
  }
  .icon-btn:hover { background: var(--surface2); color: var(--text); }

  .user-strip {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 2px solid var(--accent);
  }
  .avatar-placeholder {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700;
    flex-shrink: 0;
    color: white;
  }
  .user-name { font-size: 0.85rem; font-weight: 500; }
  .user-status { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
  .logout-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.75rem;
    padding: 5px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .logout-btn:hover { background: var(--surface2); color: var(--text); }

  .search-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 9px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-wrap input:focus { border-color: var(--accent); }

  .channels-label {
    padding: 14px 16px 8px;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .channel-list { flex: 1; overflow-y: auto; padding-bottom: 8px; }
  .channel-list::-webkit-scrollbar { width: 4px; }
  .channel-list::-webkit-scrollbar-track { background: transparent; }
  .channel-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .channel-item {
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 10px;
    margin: 2px 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.15s;
    position: relative;
  }
  .channel-item:hover { background: var(--surface2); }
  .channel-item.active { background: rgba(255,94,58,0.12); }
  .channel-item.active .ch-name { color: var(--accent); }
  .ch-icon {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .channel-item.active .ch-icon { background: rgba(255,94,58,0.15); }
  .ch-info { flex: 1; min-width: 0; }
  .ch-name { font-size: 0.88rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-preview { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .ch-badge {
    background: var(--accent);
    color: white;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  /* ── Main Chat ── */
  #chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
  }
  .chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    flex-shrink: 0;
  }
  #mobile-menu-btn {
    display: none;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 9px;
    width: 36px; height: 36px;
    align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    flex-shrink: 0;
  }
  .chat-header-info h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
  }
  .chat-header-info p { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
  .chat-header-actions { margin-left: auto; display: flex; gap: 8px; }

  .messages-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    scroll-behavior: smooth;
  }
  .messages-wrap::-webkit-scrollbar { width: 4px; }
  .messages-wrap::-webkit-scrollbar-track { background: transparent; }
  .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .day-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0 8px;
  }
  .day-divider span {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    font-weight: 500;
  }
  .day-divider::before, .day-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 72%;
    animation: msgIn 0.25s ease;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-row.me {
    align-self: flex-end;
    flex-direction: row-reverse;
  }
  .msg-row.them { align-self: flex-start; }

  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    margin-bottom: 2px;
  }
  .msg-avatar-ph {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
    color: white;
  }

  .msg-content { display: flex; flex-direction: column; gap: 2px; }
  .msg-row.me .msg-content { align-items: flex-end; }

  .msg-sender {
    font-size: 0.72rem;
    color: var(--muted);
    padding: 0 4px;
    margin-bottom: 2px;
  }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 0.9rem;
    line-height: 1.5;
    max-width: 100%;
    word-break: break-word;
    position: relative;
  }
  .msg-row.me .bubble {
    background: var(--bubble-me);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg-row.them .bubble {
    background: var(--bubble-them);
    color: var(--text);
    border-bottom-left-radius: 4px;
    border: 1px solid var(--border);
  }
  .bubble-time {
    font-size: 0.68rem;
    color: var(--muted);
    padding: 0 4px;
    margin-top: 1px;
  }

  /* consecutive messages */
  .msg-row.me .bubble + .bubble { border-top-right-radius: 4px; }
  .msg-row.them .bubble + .bubble { border-top-left-radius: 4px; }

  .typing-indicator {
    display: none;
    align-self: flex-start;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }
  .typing-indicator.show { display: flex; }
  .typing-dots {
    background: var(--bubble-them);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 10px 14px;
    display: flex; gap: 4px; align-items: center;
  }
  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    animation: bounce 1.4s infinite ease-in-out;
  }
  .typing-dots span:nth-child(1) { animation-delay: 0s; }
  .typing-dots span:nth-child(2) { animation-delay: 0.16s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ── Input ── */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .input-box {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 12px;
    transition: border-color 0.2s;
  }
  .input-box:focus-within { border-color: var(--accent); }
  .input-actions-left { display: flex; gap: 4px; flex-shrink: 0; }
  .attach-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    transition: all 0.15s;
  }
  .attach-btn:hover { color: var(--text); background: var(--surface2); }
  #msg-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.92rem;
    resize: none;
    min-height: 24px;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.5;
    padding: 3px 0;
  }
  #msg-input::placeholder { color: var(--muted); }
  #send-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    flex-shrink: 0;
    transform: rotate(-45deg);
  }
  #send-btn:hover { background: #ff7050; transform: rotate(-45deg) scale(1.08); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Empty / Loading states ── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
  }
  .empty-state .big-icon { font-size: 48px; opacity: 0.4; }
  .empty-state p { font-size: 0.9rem; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 0.85rem;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Mobile overlay backdrop ── */
  #sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 9;
    backdrop-filter: blur(2px);
  }

  /* ── Config modal ── */
  #config-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #config-modal.show { display: flex; }
  .config-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    width: min(500px, 100%);
    display: flex;
    flex-direction: column;
    gap: 20px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }
  .config-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
  }
  .config-card p { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
  .config-card label { font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 6px; }
  .config-card input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .config-card input:focus { border-color: var(--accent); }
  .config-card .field { margin-bottom: 4px; }
  #save-config-btn {
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    padding: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  #save-config-btn:hover { background: #ff7050; }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    :root { --sidebar-w: 280px; }
    #mobile-menu-btn { display: flex; }
    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 10;
      transform: translateX(-100%);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebar-overlay.show { display: block; }
    .chat-header { padding: 14px 16px; }
    .messages-wrap { padding: 16px 14px; }
    .input-area { padding: 12px 14px 16px; }
    .msg-row { max-width: 85%; }
  }
</style>
</head>
<body>


<!-- Login Screen -->
<div id="login-screen" style="display:none;">
  <div class="login-card">
    <div class="logo-mark"></div>
    <h1>Welcome to<br/><span>Saraswathi</span></h1>
    <p>Real-time messaging.</p>
    <button id="google-login-btn">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.6 33.1 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.1-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3 0 5.8 1.1 7.9 3l5.7-5.7C34 6.5 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-1.9 13.5-5l-6.2-5.2C29.5 35.6 26.9 36.5 24 36.5c-5.2 0-9.6-3.5-11.2-8.3l-6.5 5C9.7 40 16.4 44 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3c-.8 2.3-2.3 4.3-4.3 5.7l6.2 5.2C41 35.3 44 30 44 24c0-1.3-.1-2.7-.4-4z"/></svg>
      Nkn with Google
    </button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark" style="width:32px;height:32px;border-radius:9px;font-size:16px;">🔥</div>
      <span class="sidebar-logo">Em<span>ber</span></span>
      <div class="sidebar-header-actions">
        <button class="icon-btn" id="new-channel-btn" title="New channel">＋</button>
      </div>
    </div>

    <div class="user-strip">
      <div id="sidebar-avatar-wrap"></div>
      <div>
        <div class="user-name" id="sidebar-username">User</div>
        <div class="user-status">● Online</div>
      </div>
      <button class="logout-btn" id="logout-btn">Sign out</button>
    </div>

    <div class="search-wrap">
      <input type="text" id="channel-search" placeholder="Search channels…" />
    </div>

    <div class="channels-label">Channels</div>
    <div class="channel-list" id="channel-list"></div>
  </aside>

  <!-- Chat -->
  <main id="chat-area">
    <div class="chat-header">
      <button id="mobile-menu-btn">☰</button>
      <div id="chat-header-icon" class="ch-icon" style="width:38px;height:38px;border-radius:10px;background:var(--surface);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">#</div>
      <div class="chat-header-info">
        <h2 id="chat-header-name">Select a channel</h2>
        <p id="chat-header-desc">Choose a channel to start chatting</p>
      </div>
      <div class="chat-header-actions">
        <button class="icon-btn" id="members-btn" title="Members">👥</button>
      </div>
    </div>

    <div class="messages-wrap" id="messages-wrap">
      <div class="empty-state" id="empty-state">
        <div class="big-icon">💬</div>
        <p>Select a channel to see messages</p>
      </div>
    </div>

    <div class="typing-indicator" id="typing-indicator">
      <div class="typing-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <div class="input-actions-left">
          <button class="attach-btn">＋</button>
          <button class="attach-btn">😊</button>
        </div>
        <textarea id="msg-input" rows="1" placeholder="Message…" disabled></textarea>
        <button id="send-btn" disabled>➤</button>
      </div>
    </div>
  </main>
</div>

<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';

import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider,
  signOut,
  onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  query,
  orderBy,
  serverTimestamp,
  limit
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';


// ── State ──
let app, auth, db, currentUser = null;
let currentChannel = null;
let unsubMessages = null;


// ── Firebase Config ──
const firebaseConfig = {
  apiKey: "AIzaSyBkK16_d4R0VWeQCgOjH296cTbZNLxM-ts",
  authDomain: "microintel-saraswati.firebaseapp.com",
  projectId: "microintel-saraswati",
  storageBucket: "microintel-saraswati.firebasestorage.app",
  messagingSenderId: "42134813237",
  appId: "1:42134813237:web:2ba582aa74b2a74c480f7c"
  };


// ── Init Firebase ──
app = initializeApp(firebaseConfig);
auth = getAuth(app);
db = getFirestore(app);


// ── Default channels ──
const DEFAULT_CHANNELS = [
  {
    id: 'general',
    name: 'General',
    icon: '💬',
    desc: 'General conversation for everyone'
  },
  {
    id: 'random',
    name: 'Random',
    icon: '🎲',
    desc: 'Off-topic and random fun'
  },
  {
    id: 'announcements',
    name: 'Announcements',
    icon: '📣',
    desc: 'Important updates'
  },
];


// ── Show Login ──
document.getElementById('login-screen').style.display = 'flex';


// ── Auth State ──
onAuthStateChanged(auth, user => {
  if (user) {
    currentUser = user;
    startApp();
  } else {
    currentUser = null;
    document.getElementById('app').classList.remove('visible');
    document.getElementById('login-screen').style.display = 'flex';
  }
});


// ── Helpers ──
function showToast(msg, dur = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');

  setTimeout(() => {
    t.classList.remove('show');
  }, dur);
}

function formatTime(ts) {
  if (!ts) return '';

  const d = ts.toDate ? ts.toDate() : new Date(ts);

  return d.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit'
  });
}

function formatDay(ts) {
  if (!ts) return '';

  const d = ts.toDate ? ts.toDate() : new Date(ts);

  const today = new Date();

  const yesterday = new Date();
  yesterday.setDate(today.getDate() - 1);

  if (d.toDateString() === today.toDateString()) {
    return 'Today';
  }

  if (d.toDateString() === yesterday.toDateString()) {
    return 'Yesterday';
  }

  return d.toLocaleDateString([], {
    month: 'long',
    day: 'numeric',
    year: 'numeric'
  });
}

function autoResize(ta) {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
}

function escapeHtml(str) {
  return str
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}


// ── Google Login ──
document.getElementById('google-login-btn').addEventListener('click', async () => {
  try {
    const provider = new GoogleAuthProvider();

    await signInWithPopup(auth, provider);

  } catch(e) {
    showToast('Login failed: ' + e.message);
  }
});


// ── Logout ──
document.getElementById('logout-btn').addEventListener('click', async () => {
  await signOut(auth);
  showToast('Signed out.');
});


// ── Start App ──
function startApp() {

  document.getElementById('login-screen').style.display = 'none';

  document.getElementById('app').classList.add('visible');

  const wrap = document.getElementById('sidebar-avatar-wrap');

  if (currentUser.photoURL) {

    wrap.innerHTML =
      `<img src="${currentUser.photoURL}" class="avatar" alt="avatar"/>`;

  } else {

    const init =
      (currentUser.displayName || 'U')[0].toUpperCase();

    wrap.innerHTML =
      `<div class="avatar-placeholder">${init}</div>`;
  }

  document.getElementById('sidebar-username').textContent =
    currentUser.displayName ||
    currentUser.email ||
    'User';

  renderChannelList();

  selectChannel(DEFAULT_CHANNELS[0]);
}


// ── Channel List ──
function renderChannelList(filter = '') {

  const list = document.getElementById('channel-list');

  list.innerHTML = '';

  const channels = DEFAULT_CHANNELS.filter(c =>
    c.name.toLowerCase().includes(filter.toLowerCase())
  );

  channels.forEach(ch => {

    const item = document.createElement('div');

    item.className =
      'channel-item' +
      (currentChannel?.id === ch.id ? ' active' : '');

    item.innerHTML = `
      <div class="ch-icon">${ch.icon}</div>

      <div class="ch-info">
        <div class="ch-name">${ch.name}</div>

        <div class="ch-preview"
             id="preview-${ch.id}">
          Loading…
        </div>
      </div>
    `;

    item.addEventListener('click', () => {
      closeSidebar();
      selectChannel(ch);
    });

    list.appendChild(item);

    loadChannelPreview(ch.id);
  });
}


// ── Channel Preview ──
async function loadChannelPreview(channelId) {

  try {

    const q = query(
      collection(db, 'channels', channelId, 'messages'),
      orderBy('createdAt', 'desc'),
      limit(1)
    );

    onSnapshot(q, snap => {

      const el =
        document.getElementById(`preview-${channelId}`);

      if (!el) return;

      if (snap.empty) {
        el.textContent = 'No messages yet';
        return;
      }

      const msg = snap.docs[0].data();

      const name =
        (msg.displayName || 'Unknown').split(' ')[0];

      const text = msg.text || '';

      el.textContent =
        `${name}: ${text.substring(0, 28)}${text.length > 28 ? '…' : ''}`;
    });

  } catch(e) {}
}


// ── Search ──
document.getElementById('channel-search')
.addEventListener('input', e => {
  renderChannelList(e.target.value);
});


// ── Select Channel ──
function selectChannel(ch) {

  currentChannel = ch;

  renderChannelList(
    document.getElementById('channel-search').value
  );

  document.getElementById('chat-header-icon').textContent = ch.icon;

  document.getElementById('chat-header-name').textContent = ch.name;

  document.getElementById('chat-header-desc').textContent = ch.desc;

  document.getElementById('msg-input').disabled = false;

  document.getElementById('send-btn').disabled = false;

  document.getElementById('msg-input').placeholder =
    `Message #${ch.name.toLowerCase()}…`;

  document.getElementById('empty-state').style.display = 'none';

  if (unsubMessages) unsubMessages();

  listenMessages(ch.id);
}


// ── Listen Messages ──
function listenMessages(channelId) {

  const msgsWrap =
    document.getElementById('messages-wrap');

  const q = query(
    collection(db, 'channels', channelId, 'messages'),
    orderBy('createdAt', 'asc'),
    limit(100)
  );

  unsubMessages = onSnapshot(q, snap => {

    const existing =
      msgsWrap.querySelectorAll('.msg-row, .day-divider');

    existing.forEach(e => e.remove());

    let lastDay = null;

    snap.forEach(docSnap => {

      const msg = {
        id: docSnap.id,
        ...docSnap.data()
      };

      const day =
        msg.createdAt ? formatDay(msg.createdAt) : null;

      if (day && day !== lastDay) {

        const div = document.createElement('div');

        div.className = 'day-divider';

        div.innerHTML = `<span>${day}</span>`;

        msgsWrap.appendChild(div);

        lastDay = day;
      }

      msgsWrap.appendChild(buildBubble(msg));
    });

    msgsWrap.scrollTop = msgsWrap.scrollHeight;
  });
}


// ── Build Bubble ──
function buildBubble(msg) {

  const isMe = msg.uid === currentUser?.uid;

  const row = document.createElement('div');

  row.className =
    `msg-row ${isMe ? 'me' : 'them'}`;

  const avatarHtml = isMe ? '' : (
    msg.photoURL
      ? `<img src="${msg.photoURL}" class="msg-avatar"/>`
      : `<div class="msg-avatar-ph">
           ${(msg.displayName || '?')[0].toUpperCase()}
         </div>`
  );

  row.innerHTML = `
    ${avatarHtml}

    <div class="msg-content">

      ${!isMe
        ? `<div class="msg-sender">
             ${msg.displayName || 'Unknown'}
           </div>`
        : ''}

      <div class="bubble">
        ${escapeHtml(msg.text || '')}
      </div>

      <div class="bubble-time">
        ${formatTime(msg.createdAt)}
      </div>

    </div>
  `;

  return row;
}


// ── Send Message ──
async function sendMessage() {

  const input =
    document.getElementById('msg-input');

  const text = input.value.trim();

  if (!text || !currentChannel || !currentUser) {
    return;
  }

  input.value = '';

  autoResize(input);

  document.getElementById('send-btn').disabled = true;

  try {

    await addDoc(
      collection(db, 'channels', currentChannel.id, 'messages'),
      {
        text,
        uid: currentUser.uid,
        displayName:
          currentUser.displayName ||
          currentUser.email ||
          'User',

        photoURL: currentUser.photoURL || null,

        createdAt: serverTimestamp(),
      }
    );

  } catch(e) {

    showToast('Failed to send: ' + e.message);

  } finally {

    document.getElementById('send-btn').disabled = false;

    input.focus();
  }
}


// ── Send Button ──
document.getElementById('send-btn')
.addEventListener('click', sendMessage);


// ── Enter Key ──
document.getElementById('msg-input')
.addEventListener('keydown', e => {

  if (e.key === 'Enter' && !e.shiftKey) {

    e.preventDefault();

    sendMessage();
  }
});


// ── Auto Resize ──
document.getElementById('msg-input')
.addEventListener('input', function() {
  autoResize(this);
});


// ── New Channel ──
document.getElementById('new-channel-btn')
.addEventListener('click', () => {

  const name = prompt('Enter channel name:');

  if (!name) return;

  const id = name
    .toLowerCase()
    .replace(/\s+/g, '-')
    .replace(/[^a-z0-9-]/g, '');

  const icons =
    ['🌟','🎯','🚀','💡','🎨','🏆','🎵','🌊'];

  const icon =
    icons[Math.floor(Math.random() * icons.length)];

  DEFAULT_CHANNELS.push({
    id,
    name,
    icon,
    desc: `${name} channel`
  });

  renderChannelList();

  showToast(`#${name} created!`);
});


// ── Mobile Sidebar ──
document.getElementById('mobile-menu-btn')
.addEventListener('click', () => {

  document.getElementById('sidebar')
    .classList.add('open');

  document.getElementById('sidebar-overlay')
    .classList.add('show');
});

function closeSidebar() {

  document.getElementById('sidebar')
    .classList.remove('open');

  document.getElementById('sidebar-overlay')
    .classList.remove('show');
}

document.getElementById('sidebar-overlay')
.addEventListener('click', closeSidebar);

</script>
</body>
</html>
